name: Sync FFmpeg Upstream Daily

on:
  workflow_dispatch:  # Manual trigger
  schedule:
    - cron: '0 0 * * *'  # Daily at 0:00 UTC

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your fork
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}
          fetch-depth: 0
          persist-credentials: true

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git config pull.rebase true
          git config pull.ff only

      - name: Add and fetch upstream
        run: |
          git remote add upstream https://github.com/FFmpeg/FFmpeg.git 2>/dev/null || true
          git fetch upstream
          git fetch origin

      - name: Get commit information
        run: |
          echo "=== Your latest commits ==="
          git log --oneline -5
          echo ""
          echo "=== Upstream latest commits ==="
          git log --oneline -5 upstream/master
          echo ""
          echo "=== Branch status ==="
          git status

      - name: Sync with upstream safely
        run: |
          # Store original state
          ORIGINAL_BRANCH=$(git rev-parse --abbrev-ref HEAD)
          if [ "$ORIGINAL_BRANCH" = "HEAD" ]; then
            ORIGINAL_BRANCH="master"
          fi
          
          echo "Working on branch: $ORIGINAL_BRANCH"
          
          # Fetch latest from both remotes
          git fetch upstream
          git fetch origin
          
          # Check if we're behind upstream
          UPSTREAM_COMMIT=$(git rev-parse upstream/master)
          LOCAL_COMMIT=$(git rev-parse HEAD)
          
          if [ "$UPSTREAM_COMMIT" = "$LOCAL_COMMIT" ]; then
            echo "Already up to date with upstream"
            exit 0
          fi
          
          # Try to rebase your changes on top of upstream (preserves your commits)
          echo "Rebasing your commits on top of upstream..."
          if git rebase upstream/master; then
            echo "Successfully rebased on upstream"
          else
            echo "Rebase failed, trying merge instead..."
            git rebase --abort 2>/dev/null || true
            git reset --hard HEAD 2>/dev/null || true
            
            # Fallback to merge approach
            git checkout -b temp-merge-$(date +%s)
            git pull upstream master --no-commit
            git commit -m "Merge upstream FFmpeg changes
            
            Preserving existing local commits." || true
            git checkout $ORIGINAL_BRANCH
            git merge temp-merge-$(date +%s)
            git branch -D temp-merge-$(date +%s)
          fi

      - name: Push changes preserving your commits
        run: |
          # Check if there are changes to push
          git diff-index --quiet HEAD -- || {
            echo "Pushing changes to preserve your commits..."
            git push origin HEAD:${{ github.ref_name || 'master' }} --force-with-lease
            echo "Successfully synced with upstream while preserving your commits!"
          } || {
            echo "Pushing to ensure synchronization..."
            git push origin HEAD:${{ github.ref_name || 'master' }}
            echo "Repository is now up to date!"
          }

      - name: Summary
        run: |
          echo "=== Sync Summary ==="
          echo "Current HEAD: $(git rev-parse --short HEAD)"
          echo "Upstream HEAD: $(git rev-parse --short upstream/master)"
          echo "Your commits are preserved and upstream is synchronized"
          echo "Sync completed at: $(date -u)"
